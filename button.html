<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Button</title>
</head>
<body>
    <button onclick="sendType('Receiving')">Receiving</button>
    <br>
    <button onclick="sendType('Releasing')">Releasing</button>

    <script>
        function sendType(type){

            localStorage.setItem("speakType", type);
            
        }
    </script>
</body>
</html>
